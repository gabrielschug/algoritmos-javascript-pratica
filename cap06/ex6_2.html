<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="shortcut icon" href="" type="image/x-icon">
  <title>Exemplo 6.2</title>
</head>

<body>
  <img class="alta"
    src="https://images.pexels.com/photos/3143085/pexels-photo-3143085.jpeg?_gl=1*1skk380*_ga*MzE3NTc1Mzg5LjE3NjI0NjA2NTg.*_ga_8JE65Q40S6*czE3NjY4OTg0NTckbzckZzEkdDE3NjY4OTg1NTAkajU5JGwwJGgw"
    alt="Imagem">
  <h1>Jogo Descubra o Número</h1>
  <form>
    <p> Número: <input type="number" min="1" max="100" step="1" id="inNumero" required autofocus>
      <input type="submit" value="Apostar" id="btSubmit">
      <input type="button" value="Jogar Novamente" id="btNovo" class="oculta">
    </p>
  </form>
  <h3> Erros: <span id="outErros">0</span></h3>
  <h3> Chances: <span id="outChances">6</span></h3>
  <h3 id="outDica" class="italico">Dica: É um número entre 1 e 100</h3>
  <script src="js/ex6_2.js"></script>
</body>

</html>
