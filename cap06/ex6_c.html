<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/174/174854.png" type="image/x-icon">
  <title>Exemplo 6.c</title>
</head>

<body>
  <img class="alta"
    src="https://images.pexels.com/photos/7092540/pexels-photo-7092540.jpeg?_gl=1*13tww7s*_ga*MzE3NTc1Mzg5LjE3NjI0NjA2NTg.*_ga_8JE65Q40S6*czE3Njk3MzM5NDgkbzE0JGcxJHQxNzY5NzM0MDMwJGo0OSRsMCRoMA.."
    alt="Imagem Ilustrativa">
  <h1>Programa Concurso</h1>
  <form>
    <div>
      <div>
        <label for="inCandidato">Candidato: </label>
        <input type="text" id="inCandidato" name="inCandidato" required autofocus>
      </div>
      <div>
        <label for="inAcertos">Acertos: </label>
        <input type="number" id="inAcertos" name="inAcertos" required>
        <input type="submit" value="Adicionar" id="btSubmit">
      </div>
    </div>
    <div>
      <input type="button" value="Listar Todos" id="botaoListarCandidatos">
      <input type="button" value="Aprovados 2ª Etapa" id="botaoMostrarAprovados">
    </div>
  </form>
  <h3></h3>
  <pre></pre>
  <script src="js/ex6_c.js"></script>
</body>

</html>
