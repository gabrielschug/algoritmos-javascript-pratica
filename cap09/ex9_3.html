☐ Título claro

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/livrosjs.png">
  <link rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
  <title>Exemplo 9.3</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-4">
        <img src="https://images.pexels.com/photos/30870748/pexels-photo-30870748.jpeg" alt="Melancia"
          class="img-fluid">
      </div>
      <div class="col-sm-8">
        <h1>Qual é o peso da Melancia?</h1>
        <form>
          <div>
            <label for="inNome">Nome do Apostador</label><br>
            <input type="text" id="inNome" class="for-control" required autofocus>
          </div>
          <div>
            <label for="inPeso">Peso (em gramas):</label><br>
            <input type="text" id="inPeso" class="for-control" required>
          </div>
          <div>
            <input type="submit" value="Apostar" class="btn btn-primary">
            <input type="button" value="Vencedor" id="btnVencedor" class="btn btn-warning">
            <input type="button" value="Limpar Apostas" id="btnLimpar" class="btn btn-danger">
          </div>
        </form>
        <pre></pre>
      </div>
    </div>
  </div>
  <script src="js/ex9_3.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
