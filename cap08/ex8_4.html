<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/174/174854.png" type="image/x-icon">
  <title>Exemplo 8.2</title>
</head>

<body>
  <img class="alta"
    src="https://images.pexels.com/photos/34413634/pexels-photo-34413634.jpeg?_gl=1*1otawdq*_ga*Njc0MTI4Nzk4LjE3NjAwMzY4NDQ.*_ga_8JE65Q40S6*czE3NzUzMDY3MjEkbzIkZzAkdDE3NzUzMDY3MjEkajYwJGwwJGgw"
    alt="Imagem Ilustrativa">
  <h1>Pizzaria Avenida - Controle de Pedidos</h1>
  <form>
    <div>
      <label for="inModelo">Item do Pedido: </label>
      <input type="radio" id="rbPizza" name="produto" checked autofocus>Pizza <input type="radio" id="rbBebida"
        name="produto">Bebida <span>Item:</span>
      <select name="inPizza" id="inPizza">
        <option value="media">Pizza Média</option>
        <option value="grande">Pizza Grande</option>
        <option value="familia">Pizza Família</option>
      </select>
      <select name="inBebida" id="inBebida" class="oculta">
        <option value="refri">Refrigerante Litro</option>
        <option value="suco">Jarra Suco</option>
        <option value="agua">Água Mineral</option>
      </select>
    </div>
    <div>
      <label for="detalhes">Detalhes do Item: </label>
      <input type="text" id="inDetalhes" name="inDetalhes" class="detalhes">
      <input type="submit" value="Adicionar">
    </div>
  </form>
  <pre></pre>
  <script src="js/ex8_4.js"></script>
</body>

</html>
