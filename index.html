<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Lógica de Programação JS - Gabriel Schug</title>
  <style>
    /* CSS focado em um design clean e profissional */
    :root {
      --primary-color: #2563eb;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-color: #1e293b;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    header h1 {
      color: var(--primary-color);
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      color: #64748b;
      font-size: 1.1rem;
    }

    .chapter-card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border-left: 5px solid var(--primary-color);
    }

    .chapter-card h2 {
      margin-top: 0;
      font-size: 1.5rem;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 10px;
    }

    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    .exercise-grid li a {
      display: block;
      background-color: #f1f5f9;
      color: var(--text-color);
      text-decoration: none;
      padding: 12px 15px;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.3s ease;
      border: 1px solid #e2e8f0;
    }

    .exercise-grid li a:hover {
      background-color: var(--primary-color);
      color: white;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Lógica e Algoritmos com JavaScript</h1>
      <p>Portfólio de exercícios práticos que executei</p>
    </header>

      </ul>

      <ul class="exercise-grid">
        <li><a href="capitulo02/ex2_1.html">Exemplo 2.1 - Maioridade</a></li>
      </ul>
    </section> -->
  </div>
</body>
