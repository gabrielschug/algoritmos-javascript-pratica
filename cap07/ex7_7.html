<meta charset="UTF-8">
<script>

  const anoAtual = new Date().getFullYear() //2026
  const idade = prompt(`Quantos anos você comemora  em ${anoAtual}?`) // 29

  const anoNascimento = anoAtual - idade // 2026 - 29 = 1997

  console.log(`Ah... então você nasceu em ${anoNascimento}`) // 1997

</script>
