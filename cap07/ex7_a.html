<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/174/174854.png" type="image/x-icon">
  <title>Exemplo 7.a</title>
</head>

<body>
  <img class="alta"
    src="https://images.pexels.com/photos/5935788/pexels-photo-5935788.jpeg?_gl=1*138f9fw*_ga*MzE3NTc1Mzg5LjE3NjI0NjA2NTg.*_ga_8JE65Q40S6*czE3NzQwMzI0MTMkbzE5JGcxJHQxNzc0MDMyNTE1JGo1OSRsMCRoMA.."
    alt="Imagem Ilustrativa">
  <h1>Programa Criptografia</h1>
  <form>
    <div>
      <label for="inMensagem">Mensagem: </label>
      <input type="text" id="inMensagem" name="inMensagem" autofocus required>
    </div>
    <input type="submit" value="Criptografar">
    <input type="button" id="outDescriptografar" value="Descriptografar" name="outDescriptografar"
      class="alinha-direita">
  </form>
  <h3></h3>
  <script src="js/ex7_a.js"></script>
</body>

</html>
